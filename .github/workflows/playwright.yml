name: Playwright Tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # Run tests on multiple browsers with sharding for parallelization
        browser: [chromium, firefox, webkit]
        shard: [1/4, 2/4, 3/4, 4/4]
    
    env:
      WARMUP_BROWSER: ${{ matrix.browser }}
      # Enable parallelization within each shard
      PLAYWRIGHT_WORKERS: 4
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Init MSW worker
      working-directory: ./frontend
      run: npx msw init public/ --save

    - name: Verify MSW worker exists
      working-directory: ./frontend
      run: ls -la public/mockServiceWorker.js || true
    
    - name: Run TypeScript check
      working-directory: ./frontend
      run: npx tsc --noEmit
    
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: |
        npx playwright install --with-deps ${{ matrix.browser }}
        # Ensure all system dependencies are installed for webkit
        if [ "${{ matrix.browser }}" = "webkit" ]; then
          sudo apt-get update
          sudo apt-get install -y libwoff1 libopus0 libwebpdemux2 libharfbuzz-icu0 libenchant-2-2 libsecret-1-0 libhyphen0 libmanette-0.2-0 libflite1 libgles2 gstreamer1.0-libav
        fi
    
    - name: Run Playwright tests
      working-directory: ./frontend
      run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}
      env:
        CI: true
        VITE_USE_MSW: 'true'
    
    - name: Upload blob report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: blob-report-${{ matrix.browser }}-${{ strategy.job-index }}
        path: frontend/blob-report/
        retention-days: 1

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results-${{ matrix.browser }}-${{ strategy.job-index }}
        path: frontend/test-results/
        retention-days: 7

  # Merge all sharded reports into a single HTML report per browser
  merge-reports:
    name: Merge Reports
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Download blob reports for ${{ matrix.browser }}
      uses: actions/download-artifact@v4
      with:
        pattern: blob-report-${{ matrix.browser }}-*
        path: frontend/all-blob-reports
        merge-multiple: true
    
    - name: Merge reports
      working-directory: ./frontend
      run: npx playwright merge-reports --reporter html ./all-blob-reports
    
    - name: Upload merged HTML report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.browser }}
        path: frontend/playwright-report/
        retention-days: 14
