name: Spellcheck

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
      - "release-*"
    paths:
      - ".github/workflows/spellcheck.yml"
      - ".github/spellcheck/.spellcheck.yml"
      - ".github/spellcheck/.wordlist.txt"
      - "**/*.md"
  pull_request:
    branches:
      - "**"
    paths:
      - "**/*.md"
      - ".github/spellcheck/**"
      - ".github/workflows/spellcheck.yml"

permissions:
  contents: read

jobs:
  spellcheck:
    uses: kubestellar/infra/.github/workflows/reusable-spellcheck.yml@main
    secrets: inherit
